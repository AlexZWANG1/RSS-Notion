# Tavily 定向搜索（补漏无 RSS 的站点）
search:
  enabled: true
  site_queries:
    - { site: "anthropic.com", query: "AI research announcements" }
    - { site: "deepseek.com", query: "DeepSeek model release" }
    - { site: "epochai.org", query: "AI compute trends" }
    - { site: "menlovc.com", query: "AI investment insights" }
    - { site: "metr.org", query: "AI safety evaluation" }
    - { site: "lmarena.ai", query: "chatbot arena model ranking" }
