# Tavily 搜索：只搜没有 RSS 的指定站点，补漏用
search:
  enabled: true
  provider: tavily
  max_age_days: 7
  max_per_query: 3
  site_queries:
    - { site: "anthropic.com", name: "Anthropic" }
    - { site: "deepseek.com", name: "DeepSeek" }
    - { site: "epochai.org", name: "Epoch AI" }
    - { site: "menlovc.com", name: "Menlo Ventures" }
    - { site: "metr.org", name: "METR" }
    - { site: "lmarena.ai", name: "Chatbot Arena" }
    - { site: "x.com", name: "X/Twitter" }
