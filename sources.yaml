rss:
  # 官方一手
  - { name: "OpenAI News", url: "https://openai.com/news/rss.xml", category: "官方一手" }
  - { name: "Google DeepMind", url: "https://deepmind.google/blog/rss.xml", category: "官方一手" }
  - { name: "Google Research", url: "https://blog.research.google/feeds/posts/default?alt=rss", category: "官方一手" }
  - { name: "Microsoft Research", url: "https://www.microsoft.com/en-us/research/feed/", category: "官方一手" }
  - { name: "HuggingFace Blog", url: "https://huggingface.co/blog/feed.xml", category: "AI技术社区" }

  # 投资机构
  - { name: "a16z Future", url: "https://future.a16z.com/feed/", category: "投资机构" }
  - { name: "Sequoia Capital", url: "https://www.sequoiacap.com/feed/", category: "投资机构" }

  # 独立研究
  - { name: "Semianalysis", url: "https://semianalysis.com/feed/", category: "独立研究" }

  # Anthropic / Epoch AI / Menlo Ventures 没有可用的 RSS
  # 这些通过 Tavily 搜索补漏

search:
  enabled: true
  provider: tavily
  max_age_days: 3
  queries:
    - "AI agent infrastructure startup funding"
    - "LLM inference cost breakthrough 2026"
    - "AI startup funding round series"
    - "Anthropic OpenAI Google AI product launch"
    - "AI competitive landscape moat analysis"
  max_per_query: 8
